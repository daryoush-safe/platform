apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: grafana-dashboard-fastapi-metrics
    files:
      - dashboards/fastapi-metrics.json
  - name: grafana-dashboard-kafka-exporter
    files:
      - dashboards/kafka-exporter.json
  - name: grafana-dashboard-postgresql-exporter
    files:
      - dashboards/postgresql-exporter.json
  - name: grafana-dashboard-strimzi-kafka
    files:
      - dashboards/strimzi-kafka.json
  - name: grafana-dashboard-strimzi-kafka-connect
    files:
      - dashboards/strimzi-kafka-connect.json
