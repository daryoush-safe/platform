extraManifests:
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: prometheus-basicauth
      namespace: observability
    spec:
      basicAuth:
        secret: prometheus-basic-auth

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false

    # no target uses this label, Prometheus scrapes nothing; Alloy is the sole collector
    serviceMonitorSelector:
      matchLabels:
        release: alloy-collector-only
    podMonitorSelector:
      matchLabels:
        release: alloy-collector-only
    probeSelector:
      matchLabels:
        release: alloy-collector-only
    scrapeConfigSelector:
      matchLabels:
        release: alloy-collector-only

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: observability-prometheus-basicauth@kubernetescrd
    hosts:
      - prometheus.local
    paths:
      - /
    pathType: Prefix

grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.local
    path: /
    pathType: Prefix