apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: alloy-config
    files:
      - config/destinations.alloy
      - config/logs.alloy
      # Add config/metrics.alloy / config/traces.alloy here later
