  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://github.com/daryoush-safe/platform.git
      targetRevision: master
      path: observability/kafka-exporter
    - repoURL: https://github.com/daryoush-safe/platform.git
      targetRevision: master
      path: observability/postgres-exporter
  destination:
