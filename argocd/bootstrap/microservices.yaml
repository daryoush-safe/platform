apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: microservices
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/daryoush-safe/platform.git
        revision: master
        files:
          - path: "apps/*/values.yaml"
  template:
    metadata:
      name: '{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform
      sources:
        - repoURL: https://github.com/daryoush-safe/platform.git
          targetRevision: master
          path: charts/microservice
          helm:
            valueFiles:
              - ../../apps/{{ .path.basename }}/values.yaml
        - repoURL: https://github.com/daryoush-safe/platform.git
          targetRevision: master
          path: 'apps/{{ .path.basename }}'
          directory:
            include: 'sealed-secret.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: apps
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
