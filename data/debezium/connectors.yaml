---
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: users-outbox-connector
  namespace: data
  labels:
    strimzi.io/cluster: connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    database.hostname: pg-rw.data.svc.cluster.local
    database.port: "5432"
    database.user: ${directory:/mnt/pg-creds:username}
    database.password: ${directory:/mnt/pg-creds:password}
    database.dbname: fastapi_ms
    topic.prefix: userservice
    schema.include.list: auth
    table.include.list: auth.users_outbox
    plugin.name: pgoutput
    publication.name: dbz_publication_user
    publication.autocreate.mode: filtered
    slot.name: debezium_user
    tombstones.on.delete: "false"
    transforms: outbox
    transforms.outbox.type: io.debezium.transforms.outbox.EventRouter
    transforms.outbox.route.by.field: aggregate_type
    transforms.outbox.route.topic.replacement: userservice.${routedByValue}
    transforms.outbox.table.field.event.id: id
    transforms.outbox.table.field.event.key: aggregate_id
    transforms.outbox.table.field.event.type: event_type
    transforms.outbox.table.field.event.payload: payload
    transforms.outbox.expand.json.payload: "true"
    transforms.outbox.table.fields.additional.placement: event_type:envelope:type
---
