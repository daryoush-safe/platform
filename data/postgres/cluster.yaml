apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: data
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  imagePullPolicy: IfNotPresent

  storage:
    size: 5Gi
    storageClass: local-path

  postgresql:
    parameters:
      wal_level: logical
      max_replication_slots: "10"
      max_wal_senders: "10"

  managed:
    roles:
      - name: user_service_role
        ensure: present
        login: true
        replication: true
        passwordSecret: { name: pg-user-service-role }
      - name: subscription_service_role
        ensure: present
        login: true
        replication: true
        passwordSecret: { name: pg-subscription-service-role }
      - name: db_service_role
        ensure: present
        login: true
        replication: true
        passwordSecret: { name: pg-db-service-role }
      - name: chat_service_role
        ensure: present
        login: true
        passwordSecret: { name: pg-chat-service-role }
      - name: debezium_role
        ensure: present
        login: true
        replication: true
        passwordSecret: { name: pg-debezium-role }
      - name: postgres_exporter
        ensure: present
        login: true
        passwordSecret: { name: pg-postgres-exporter-role }

  bootstrap:
    initdb:
      database: fastapi_ms
      owner: app
      postInitSQL:
        - CREATE ROLE user_service_role LOGIN REPLICATION;
        - CREATE ROLE subscription_service_role LOGIN REPLICATION;
        - CREATE ROLE db_service_role LOGIN REPLICATION;
        - CREATE ROLE chat_service_role LOGIN;
        - CREATE ROLE debezium_role LOGIN REPLICATION;
        - CREATE ROLE postgres_exporter LOGIN;
      postInitApplicationSQL:
        - CREATE SCHEMA IF NOT EXISTS auth;
        - CREATE SCHEMA IF NOT EXISTS dbservice;
        - CREATE SCHEMA IF NOT EXISTS chatservice;
        - CREATE EXTENSION IF NOT EXISTS pgcrypto;
        - GRANT CREATE ON DATABASE fastapi_ms TO user_service_role;
        - GRANT CREATE ON DATABASE fastapi_ms TO subscription_service_role;
        - GRANT CREATE ON DATABASE fastapi_ms TO debezium_role;
        - GRANT CREATE ON DATABASE fastapi_ms TO db_service_role;
        - GRANT USAGE, CREATE ON SCHEMA auth TO user_service_role;
        - GRANT USAGE, CREATE ON SCHEMA auth TO subscription_service_role;
        - GRANT USAGE ON SCHEMA auth TO debezium_role;
        - GRANT USAGE, CREATE ON SCHEMA dbservice TO db_service_role;
        - GRANT USAGE ON SCHEMA dbservice TO debezium_role;
        - GRANT CREATE ON DATABASE fastapi_ms TO chat_service_role;
        - GRANT USAGE, CREATE ON SCHEMA chatservice TO chat_service_role;
        - ALTER DEFAULT PRIVILEGES FOR ROLE user_service_role IN SCHEMA auth GRANT SELECT ON TABLES TO debezium_role;
        - ALTER DEFAULT PRIVILEGES FOR ROLE subscription_service_role IN SCHEMA auth GRANT SELECT ON TABLES TO debezium_role;
        - ALTER DEFAULT PRIVILEGES FOR ROLE db_service_role IN SCHEMA dbservice GRANT SELECT ON TABLES TO debezium_role;
        - GRANT user_service_role TO debezium_role;
        - GRANT subscription_service_role TO debezium_role;
        - GRANT pg_monitor TO postgres_exporter;
