image:
  repository: ghcr.io/daryoush-safe/subscription-service
  tag: sha-0c818b7e6207093410a678d1012c59061b9a7cdb
app:
  port: 8001
existingSecret: subscriptionservice-secrets
env:
  APP_NAME: SubscriptionService
  APP_HOST: "0.0.0.0"
  APP_PORT: "8001"
  KAFKA_BOOTSTRAP_SERVERS: kafka-kafka-bootstrap.data.svc.cluster.local:9092
  DEBUG: "false"
  DB_ECHO: "false"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
