  STRIPE_SUCCESS_URL: http://localhost:3000/success
  STRIPE_CANCEL_URL: http://localhost:3000/cancel
  CORS_ORIGINS: http://localhost:3000
  ROOT_PATH: /subscription
metrics:
  serviceMonitor:
    enabled: false
ingress:
  path: /subscription
  stripPrefix: true
