  tag: sha-b28d7d9c1bfbb6e1160fa68127408b4051255a56
app:
  port: 8000
existingSecret: userservice-secrets
env:
  APP_NAME: UserService
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  KAFKA_BOOTSTRAP_SERVERS: kafka-kafka-bootstrap.data.svc.cluster.local:9092
