image:
  repository: ghcr.io/daryoush-safe/user-service
  tag: sha-0c818b7e6207093410a678d1012c59061b9a7cdb
app:
  port: 8000
existingSecret: userservice-secrets
env:
  APP_NAME: UserService
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  KAFKA_BOOTSTRAP_SERVERS: kafka-kafka-bootstrap.data.svc.cluster.local:9092
  DEBUG: "false"
  DB_ECHO: "false"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  JWT_ALGORITHM: HS256
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ORIGINS: http://localhost:3000
  ROOT_PATH: /user
metrics:
  serviceMonitor:
    enabled: true
    path: /user/metrics
ingress:
  path: /user
  stripPrefix: true
