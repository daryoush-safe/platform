image:
  repository: userservice
  tag: dev

app:
  module: src.main:app
  port: 8000

existingSecret: userservice-secrets

env:
  APP_NAME: UserService
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  KAFKA_BOOTSTRAP_SERVERS: kafka-kafka-bootstrap.data.svc.cluster.local:9092
  DEBUG: "false"
  DB_ECHO: "false"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  JWT_ALGORITHM: HS256
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ORIGINS: http://localhost:3000
